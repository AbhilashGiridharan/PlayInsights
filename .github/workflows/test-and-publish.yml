name: 🎭 Test → Summarize → Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual triggers
  workflow_dispatch:

# Permissions required for data commits + GitHub Pages deployment
permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false   # Never cancel in-progress data commits

# ────────────────────────────────────────────────────────────────────────────────
jobs:
# ── 1. Run Playwright tests ───────────────────────────────────────────────────
  test:
    name: 🧪 Playwright Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run tests
        run: npm run test -- --reporter=list,html,json
        env:
          CI: "true"

      - name: Upload HTML report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 30

# ── 2. Summarize results & commit data ────────────────────────────────────────
  summarize-and-commit:
    name: 📊 Summarize & Commit Data
    runs-on: ubuntu-latest
    needs: test
    # Run even when tests fail so we record the failure data
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout (with write access)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch full history so we can push
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      # Re-run tests in CI to regenerate playwright-report/results.json
      # (artifacts from previous job are available below, but re-running
      #  ensures the JSON is fresh; alternatively download the artifact)
      - name: Download test results artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/

      - name: Generate run summary
        run: npm run summarize
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Regenerate data index
        run: npm run update:index

      - name: Commit data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "No data changes to commit." || \
            git commit -m "chore(data): add results for ${{ github.sha }}"
          git push

# ── 3. Build site & deploy to GitHub Pages ────────────────────────────────────
  build-and-deploy-pages:
    name: 🚀 Build & Deploy Dashboard
    runs-on: ubuntu-latest
    needs: summarize-and-commit
    # Only deploy on pushes to main (not PRs)
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (after data commit)
        uses: actions/checkout@v4
        with:
          # Get the latest commit which includes the newly committed data files
          ref: main

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        run: npm run build
        env:
          # Point the site at the correct raw GitHub URL for your repo
          VITE_DATA_BASE: "https://raw.githubusercontent.com/${{ github.repository }}/main/data"

      - name: Copy data/ into dist so local preview works too
        run: cp -r data/ site/dist/data

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
