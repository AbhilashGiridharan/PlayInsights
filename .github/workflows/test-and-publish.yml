name: 🎭 Test → Summarize → Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

# Only one Pages deployment at a time; never cancel data-commit jobs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
# ── 1. Run Playwright tests ───────────────────────────────────────────────────
  test:
    name: 🧪 Playwright Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run tests
        run: npm run test
        continue-on-error: true        # record failures without blocking deploy
        env:
          CI: "true"

      - name: Upload HTML report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 30

      - name: Upload JSON report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-json-report
          path: playwright-report/results.json
          retention-days: 30

# ── 2. Summarize results & commit data ────────────────────────────────────────
  summarize-and-commit:
    name: 📊 Summarize & Commit Data
    runs-on: ubuntu-latest
    needs: test
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Download JSON report artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-json-report
          path: playwright-report/

      - name: Generate run summary
        run: npm run summarize
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Ingest external reports (InsightsLogs)
        run: npm run ingest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild data index
        run: npm run update:index

      - name: Commit & push data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "No data changes." || \
            git commit -m "chore(data): add results for ${GITHUB_SHA:0:8} [skip ci]"
          git pull --rebase origin main
          git push origin main
        env:
          GITHUB_SHA: ${{ github.sha }}

# ── 3. Build site & deploy to GitHub Pages ────────────────────────────────────
  build-and-deploy-pages:
    name: 🚀 Build & Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: summarize-and-commit
    if: always() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (after data commit)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Build Vite site
        working-directory: site
        run: npm run build
        env:
          VITE_DATA_BASE: "https://raw.githubusercontent.com/${{ github.repository }}/main/data"

      - name: Copy data/ into dist (enables local preview of built site)
        run: cp -r data/ site/dist/data

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
